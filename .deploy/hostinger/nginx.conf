# Nginx in front of OpenClaw gateway — fixes 507 "exceeded request buffer limit while retrying upstream"
# Use with docker-compose.nginx.yml so traffic goes: client → nginx:80 → openclaw-gateway:18789

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    upstream openclaw {
        server openclaw-gateway:18789;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_temp_file_write_size 256k;
            proxy_request_buffering on;

            proxy_pass http://openclaw;
            # Force HTTP/1.1 to upstream (Node gateway does not speak HTTP/2)
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
