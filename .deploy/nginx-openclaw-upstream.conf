# OpenClaw gateway — nginx upstream snippet
# Use this inside the server {} or location {} that proxies to OpenClaw
# to fix: "507 exceeded request buffer limit while retrying upstream"
#
# Include in your server block, e.g.:
#   include /path/to/nginx-openclaw-upstream.conf;
# Or copy the directives into your existing proxy location.

# Allow larger request bodies (e.g. uploads, large JSON)
client_max_body_size 10M;
client_body_buffer_size 128k;

# Buffers for proxying to OpenClaw (required when nginx retries upstream)
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;
proxy_temp_file_write_size 256k;

# Keep request body buffered so it can be re-sent on retry
proxy_request_buffering on;

# Optional: timeouts for long-lived gateway/WebSocket traffic
# proxy_connect_timeout 60s;
# proxy_send_timeout 60s;
# proxy_read_timeout 60s;
